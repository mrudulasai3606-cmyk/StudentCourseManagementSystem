<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Register Course</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="#">
        Register Course
    </a>

</nav>

<div class="main-container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3>Dashboard</h3>

        <ul>

            <li>
                <a href="/">
                    Home
                </a>
            </li>

            <li>
                <a href="/students">
                    Students
                </a>
            </li>

            <li>
                <a href="/courses">
                    View Courses
                </a>
            </li>

            <li>
                <a href="/registerCourse">
                    Register Course
                </a>
            </li>

            <li>
                <a href="/registeredCourses">
                    Registered Courses
                </a>
            </li>

        </ul>

    </div>

    <!-- Content -->

    <div class="content">

        <div class="card p-5 shadow">

            <h2 class="text-center mb-4">
                Register Student To Course
            </h2>

            <!-- Available Courses -->

            <div class="mb-4">

                <h4 class="mb-3">
                    Available Courses
                </h4>

                <div class="d-flex flex-wrap gap-2">

                    <span
                            th:each="course : ${courses}"
                            class="badge bg-success p-3">

                        <span th:text="${course.courseName}"></span>

                    </span>

                </div>

            </div>

            <!-- Registration Form -->

            <form action="/registerCourse"
                  method="post">

                <!-- Student -->

                <div class="mb-4">

                    <label class="form-label">
                        Select Student
                    </label>

                    <select name="studentId"
                            class="form-select"
                            required>

                        <option value="">
                            Choose Student
                        </option>

                        <option
                                th:each="student : ${students}"
                                th:value="${student.id}"
                                th:text="${student.name}">
                        </option>

                    </select>

                </div>

                <!-- Course -->

                <div class="mb-4">

                    <label class="form-label">
                        Select Course
                    </label>

                    <select name="courseId"
                            class="form-select"
                            required>

                        <option value="">
                            Choose Course
                        </option>

                        <option
                                th:each="course : ${courses}"
                                th:value="${course.id}"
                                th:text="${course.courseName}">
                        </option>

                    </select>

                </div>

                <!-- Button -->

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-primary px-5">

                        Register Course

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

<script th:src="@{/script.js}"></script>

</body>
</html>
