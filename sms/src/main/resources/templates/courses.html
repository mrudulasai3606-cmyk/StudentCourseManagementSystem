<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <title>Available Courses</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link rel="stylesheet" th:href="@{/style.css}">

</head>

<body>

<nav class="navbar navbar-dark bg-dark px-4">

    <a class="navbar-brand" href="#">
        Available Courses
    </a>

</nav>

<div class="main-container">

    <!-- Sidebar -->

    <div class="sidebar">

        <h3>Dashboard</h3>

        <ul>

            <li>
                <a href="/">
                    Home
                </a>
            </li>

            <li>
                <a href="/students">
                    Students
                </a>
            </li>

            <li>
                <a href="/courses">
                    View Courses
                </a>
            </li>

            <li>
                <a href="/registerCourse">
                    Register Course
                </a>
            </li>

            <li>
                <a href="/registeredCourses">
                    Registered Courses
                </a>
            </li>

        </ul>

    </div>

    <!-- Content -->

    <div class="content">

        <div class="card p-4 shadow">

            <h2 class="text-center mb-4">
                Available Courses
            </h2>

            <!-- Add Course Form -->

            <form th:action="@{/saveCourse}"
                  method="post"
                  th:object="${course}"
                  class="row g-3">

                <div class="col-md-4">

                    <input type="text"
                           th:field="*{courseName}"
                           class="form-control"
                           placeholder="Course Name"
                           required>

                </div>

                <div class="col-md-4">

                    <input type="text"
                           th:field="*{trainer}"
                           class="form-control"
                           placeholder="Trainer Name"
                           required>

                </div>

                <div class="col-md-4">

                    <input type="text"
                           th:field="*{duration}"
                           class="form-control"
                           placeholder="Duration"
                           required>

                </div>

                <div class="text-center">

                    <button type="submit"
                            class="btn btn-success">

                        Add Course

                    </button>

                </div>

            </form>

            <!-- Available Courses Table -->

            <table class="table table-bordered table-hover mt-4">

                <thead class="table-dark">

                <tr>

                    <th>ID</th>
                    <th>Course Name</th>
                    <th>Trainer</th>
                    <th>Duration</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="course : ${courses}">

                    <td th:text="${course.id}"></td>

                    <td th:text="${course.courseName}"></td>

                    <td th:text="${course.trainer}"></td>

                    <td th:text="${course.duration}"></td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

<script th:src="@{/script.js}"></script>

</body>
</html>
